<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/forms.css">
    <script src="app.js" defer></script>
</head>
<body>
    <img src="gradient.png" alt="gradient-image" class="gradient-image">
    <div class="glow"></div>
    <div class="container">
        <header>
            <h1 class="name">Vinay Kumar</h1>
            <nav>
                <a href="skills.html">SKILLS</a>
                <a href="education.html">EDUCATION</a>
                <a href="projects.html">PROJECTS</a>
                <a href="index.html#my-work">MY WORK</a>
                <a href="experience.html">EXPERIENCE</a>
                <a href="services.html">SERVICES</a>
                <a href="buy.html">BUY</a>
                <a href="contact.html">CONTACT</a>
            </nav>
            <button class="btn-hire" data-hire-open>HIRE</button>
        </header>

        <div class="section">
            <h2 class="page-title">Contact</h2>
            <p class="page-subtitle">Drop a note about collaborations, projects, or just say hi.</p>
            <div class="section-shell">
                <form id="contact-form" class="form-grid">
                    <div>
                        <label for="contact-name">Name</label>
                        <input id="contact-name" name="name" placeholder="Your name" required>
                    </div>
                    <div>
                        <label for="contact-email">Email</label>
                        <input id="contact-email" name="email" type="email" placeholder="you@example.com" required>
                    </div>
                    <div class="full" style="grid-column: 1 / -1;">
                        <label for="contact-message">Message</label>
                        <textarea id="contact-message" name="message" placeholder="Tell me about your idea..." required></textarea>
                    </div>
                    <div class="form-actions" style="grid-column: 1 / -1;">
                        <button class="button-primary" type="submit">Send message</button>
                        <span class="note">You will get a confirmation if it goes through.</span>
                        <div class="form-alert" data-contact-alert></div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
    <spline-viewer class="model" url="https://prod.spline.design/PBQQBw8bfXDhBo7w/scene.splinecode" events-target="global"></spline-viewer>
</body>
</html>
